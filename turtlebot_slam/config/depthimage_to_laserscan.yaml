# depthimage_to_laserscan parameters
# Converts Kinect 360 depth image into a 2D LaserScan for SLAM

depthimage_to_laserscan_node:
  ros__parameters:
    # Frame for the output LaserScan (must match the frame published by the Kinect driver)
    output_frame_id: camera_depth_frame

    # How many rows of the depth image to use (centred vertically)
    # Lower = less floor/ceiling noise. Kinect has 480 rows.
    # 10 rows gives a tight horizontal slice — best for indoor SLAM.
    scan_height: 10

    # Range limits (metres) — Kinect 360 specs
    range_min: 0.45
    range_max: 8.0

    # Scan time (approximate, for interpolation)
    scan_time: 0.033
