# slam_toolbox parameters for online async SLAM
# Tuned for a differential drive turtlebot with Kinect 360 depth → LaserScan

slam_toolbox:
  ros__parameters:
    # General
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Map parameters
    resolution: 0.05                # 5cm per cell — good for indoor rooms
    max_laser_range: 4.0            # Reduced from 8m — Kinect is noisy beyond 4m
    minimum_time_interval: 1.0      # Only process scans every 1s (was 0.5)
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000

    # Scan matching
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.5    # metres before adding a new node
    minimum_travel_heading: 0.5     # radians before adding a new node
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.5
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation parameters — tighter search space to prevent wild jumps
    correlation_search_space_dimension: 0.3
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.03

    # Loop closure parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Odometry
    use_odometry: true
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    # Mode: online async is best for real-time mapping with teleop
    mode: mapping
